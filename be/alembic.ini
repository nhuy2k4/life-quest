[alembic]
script_location = app/migrations
# This value is overridden by env.py via settings.DATABASE_URL (from .env)
# Kept as fallback - must use asyncpg driver matching DATABASE_URL in .env
sqlalchemy.url = postgresql+asyncpg://postgres:postgresql@localhost:5432/lifequest

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
